<div id="settingsPage" class="settings-page">
  <h2>Settings</h2>
  <form id="settingsForm">
    <label for="defaultUnit">Default weight unit:</label>
    <select id="defaultUnit" name="defaultUnit">
      <option value="kg">Kilograms (kg)</option>
      <option value="lbs">Pounds (lbs)</option>
    </select>

    <label for="theme">Theme:</label>
    <select id="theme" name="theme">
      <option value="light">Light</option>
      <option value="dark">Dark</option>
      <option value="neon">Neon</option>
    </select>

    <label for="streakReminderEnabled">
      <input type="checkbox" id="streakReminderEnabled" name="streakReminderEnabled">
      Enable streak reminders
    </label>

    <label for="streakReminderTime">Reminder time:</label>
    <input type="time" id="streakReminderTime" name="streakReminderTime" value="19:00">


    <label for="autoIncrementSetting" style="display:block;margin-top:12px;">
      <input type="checkbox" id="autoIncrementSetting" name="autoIncrementSetting" checked />
      Auto-increment suggestions when the last set is at or below target RPE
    </label>

    <button type="submit" id="saveSettingsButton">Save Settings</button>
  </form>

  <section class="panel" id="athleteSetupSection" aria-labelledby="athleteSetupHeading" style="margin-top:16px;">
    <h3 id="athleteSetupHeading">Athlete Setup</h3>
    <p id="athleteSetupSummary" style="margin-top:0;">Set up prep mode details for phase-aware tracking.</p>
    <button type="button" id="phaseSetupCta" style="margin-bottom:10px;">Set Up Prep Mode</button>

    <form id="athleteSetupForm" style="display:none;">
      <label for="athleteName">Athlete name</label>
      <input id="athleteName" name="athleteName" type="text" placeholder="Athlete name">

      <label for="phaseMode">Current phase</label>
      <select id="phaseMode" name="phaseMode">
        <option value="improvement">Improvement Season</option>
        <option value="mini_cut">Mini Cut</option>
        <option value="contest_prep">Contest Prep</option>
        <option value="post_show">Post-Show</option>
      </select>

      <div id="contestPrepFields" style="display:none;">
        <label for="prepShowDate">Show date</label>
        <input id="prepShowDate" name="showDate" type="date">

        <label for="prepDivision">Division/Class</label>
        <input id="prepDivision" name="division" type="text" placeholder="Classic Physique, Bikini, etc.">

        <label for="prepCurrentWeight">Current bodyweight</label>
        <input id="prepCurrentWeight" name="currentWeight" type="number" min="0" step="0.1" placeholder="0.0">

        <label for="prepStageWeight">Estimated stage weight</label>
        <input id="prepStageWeight" name="targetStageWeight" type="number" min="0" step="0.1" placeholder="0.0">

        <label for="prepCheckInDay">Check-in day</label>
        <select id="prepCheckInDay" name="checkInDay">
          <option>Monday</option>
          <option>Tuesday</option>
          <option>Wednesday</option>
          <option>Thursday</option>
          <option>Friday</option>
          <option>Saturday</option>
          <option selected>Sunday</option>
        </select>

        <label for="prepCardioBaseline">Cardio baseline</label>
        <input id="prepCardioBaseline" name="cardioBaseline" type="text" placeholder="e.g. 4x25 min LISS">

        <label for="prepPosingFrequency">Posing target per week</label>
        <input id="prepPosingFrequency" name="posingFrequency" type="text" placeholder="e.g. 5 sessions">
      </div>

      <div id="improvementFields" style="display:none;">
        <label for="improvementStartDate">Start date</label>
        <input id="improvementStartDate" name="startDate" type="date">

        <label for="weightGoalDirection">Weight goal direction</label>
        <select id="weightGoalDirection" name="weightGoalDirection">
          <option value="">Select direction</option>
          <option value="gain">Gain</option>
          <option value="maintain">Maintain</option>
          <option value="lose">Lose</option>
        </select>
      </div>

      <div id="miniCutFields" style="display:none;">
        <label for="miniCutStartDate">Start date</label>
        <input id="miniCutStartDate" name="startDate" type="date">

        <label for="miniCutRateLoss">Target rate of loss</label>
        <input id="miniCutRateLoss" name="targetRateOfLoss" type="number" min="0" step="0.1" placeholder="% BW/week">
      </div>

      <button type="submit" id="athleteSetupSaveBtn">Save Athlete Setup</button>
    </form>
  </section>
</div>
